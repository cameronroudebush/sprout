<!doctype html>
<html>
  <head>
    <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
    <base href="$FLUTTER_BASE_HREF" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />

    <!-- Social Previews -->
    <meta property="og:title" content="Sprout" />
    <meta property="og:description" content="Grow your financial future with a personal finance tracking app." />
    <meta property="og:image" content="https://media.githubusercontent.com/media/cameronroudebush/sprout/refs/heads/gh-pages/images/store/horizontal.png" />

    <!-- Twitter Card Tags (X / Twitter) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sprout" />
    <meta name="twitter:description" content="Grow your financial future with a personal finance tracking app." />
    <meta name="twitter:image" content="https://media.githubusercontent.com/media/cameronroudebush/sprout/refs/heads/gh-pages/images/store/horizontal.png" />

    <meta name="theme-color" content="#001e2c" />

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="#001e2c" />
    <meta name="apple-mobile-web-app-title" content="Sprout" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg" href="icon/favicon-bg.svg" />

    <title>Sprout</title>
    <link rel="manifest" href="manifest.json" />
  </head>
  <style>
    html {
      -ms-text-size-adjust: 100%;
      -webkit-text-size-adjust: 100%;
    }
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #111418;
    }
    #loading_indicator {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 25% !important;
    }
    #loading_indicator img {
      width: 20vw;
      height: auto;
    }
  </style>
  <body>
    <div id="loading_indicator">
      <img src="icon/favicon-color.svg" alt="Sprout Logo" />
    </div>
    <script src="flutter_bootstrap.js" async></script>
    <script>
      // Ensure the loading indicator is removed when Flutter is ready
      window.addEventListener("flutter-first-frame", function () {
        var loadingIndicator = document.getElementById("loading_indicator");
        if (loadingIndicator) loadingIndicator.remove();
      });
    </script>
  </body>
</html>
